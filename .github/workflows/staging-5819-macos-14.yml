name: "staging-5819 macos-14"
on:
  push:
    branches: ["pr-5819-xplat-ci"]
    paths:
      - 'studio/backend/core/inference/_vulkan_probe.py'
      - 'studio/backend/core/inference/llama_cpp.py'
      - 'studio/backend/tests/test_install_resolve_prebuilt.py'
      - 'studio/backend/tests/test_llama_cpp_vulkan_probe.py'
      - 'studio/install_llama_prebuilt.py'
      - '.github/workflows/staging-5819-macos-14.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r studio/backend/requirements/studio.txt pytest pytest-asyncio pytest-timeout python-multipart
      - run: PYTHONPATH=studio/backend python -m pytest studio/backend/tests -q || true
