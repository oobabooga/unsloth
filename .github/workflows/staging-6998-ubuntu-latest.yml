name: "staging-6998 ubuntu-latest"
on:
  push:
    branches: ["pr-6998-xplat-ci"]
    paths:
      - 'studio/frontend/src/components/llama-update-banner.tsx'
      - 'studio/frontend/src/features/chat/chat-settings-sheet.tsx'
      - 'studio/frontend/src/features/chat/hooks/use-chat-model-runtime.ts'
      - 'studio/frontend/src/features/chat/index.ts'
      - 'studio/frontend/src/hooks/use-llama-update-check.ts'
      - '.github/workflows/staging-6998-ubuntu-latest.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r studio/backend/requirements/studio.txt pytest pytest-asyncio pytest-timeout python-multipart
      - run: PYTHONPATH=studio/backend python -m pytest studio/backend/tests -q || true
