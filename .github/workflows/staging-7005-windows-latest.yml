name: "staging-7005 windows-latest"
on:
  push:
    branches: ["pr-7005-xplat-ci"]
    paths:
      - 'studio/frontend/src/features/chat/chat-page.tsx'
      - '.github/workflows/staging-7005-windows-latest.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r studio/backend/requirements/studio.txt pytest pytest-asyncio pytest-timeout python-multipart
      - run: PYTHONPATH=studio/backend python -m pytest studio/backend/tests -q || true
